version: '3.8'

services:
  # MongoDB for storing processed logs
  mongodb:
    image: mongo:7
    container_name: logguard-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: logguard_secret
      MONGO_INITDB_DATABASE: logguard
    volumes:
      - mongodb_data:/data/db
    networks:
      - logguard-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ for message queuing
  rabbitmq:
    image: rabbitmq:3-management
    container_name: logguard-rabbitmq
    ports:
      - "5672:5672"   # AMQP protocol
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: logguard_secret
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - logguard-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  # Ingestion Service - Downloads and streams CICIDS-2017 dataset
  ingestion:
    build:
      context: ./ingestion
      dockerfile: Dockerfile
    container_name: logguard-ingestion
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: logguard_secret
      STREAM_INTERVAL_MS: 500
    networks:
      - logguard-network
    restart: unless-stopped

  # Processing Service - Consumes, transforms, and stores logs
  processing:
    build:
      context: ./processing
      dockerfile: Dockerfile
    container_name: logguard-processing
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: logguard_secret
      MONGODB_URI: mongodb://admin:logguard_secret@mongodb:27017/logguard?authSource=admin
    networks:
      - logguard-network
    restart: unless-stopped

  # API Gateway - REST API + WebSocket server
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: logguard-gateway
    ports:
      - "3001:3001"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    environment:
      PORT: 3001
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: admin
      RABBITMQ_PASS: logguard_secret
      MONGODB_URI: mongodb://admin:logguard_secret@mongodb:27017/logguard?authSource=admin
      CORS_ORIGIN: http://localhost:3000
    networks:
      - logguard-network
    restart: unless-stopped

volumes:
  mongodb_data:
  rabbitmq_data:

networks:
  logguard-network:
    driver: bridge
