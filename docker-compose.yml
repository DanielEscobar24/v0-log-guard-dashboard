version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================
  mongodb:
    image: mongo:7.0
    container_name: logguard-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-logguard123}
      MONGO_INITDB_DATABASE: logguard
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - logguard-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: logguard-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/rabbitmq-config/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infrastructure/rabbitmq-config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - logguard-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # SERVICES
  # ============================================
  ingestion-service:
    build:
      context: ./services/ingestion-service
      dockerfile: Dockerfile
    container_name: logguard-ingestion
    restart: unless-stopped
    environment:
      KAGGLE_USERNAME: ${KAGGLE_USERNAME}
      KAGGLE_KEY: ${KAGGLE_KEY}
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      DATA_PATH: /app/data
      STREAM_INTERVAL_MS: ${STREAM_INTERVAL_MS:-500}
    volumes:
      - ./data:/app/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - logguard-network

  analytics-engine:
    build:
      context: ./services/analytics-engine
      dockerfile: Dockerfile
    container_name: logguard-analytics
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-logguard123}@mongodb:27017/logguard?authSource=admin
      MODEL_PATH: /app/model
    volumes:
      - ./services/analytics-engine/model:/app/model:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - logguard-network

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: logguard-gateway
    restart: unless-stopped
    environment:
      PORT: 4000
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      MONGODB_URL: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-logguard123}@mongodb:27017/logguard?authSource=admin
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    ports:
      - "4000:4000"
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - logguard-network

networks:
  logguard-network:
    driver: bridge

volumes:
  mongodb_data:
  rabbitmq_data:
